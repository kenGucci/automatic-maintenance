<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Automatic Maintenance - Logo</title>
</head>
<body style="margin:0;padding:0;background:#080c14;display:flex;justify-content:center;align-items:center;min-height:100vh;">
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.3"/>
  
  <!-- Gear shape -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- Main gear circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accent)" stroke-width="8"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
    
    <!-- Gear teeth -->
    <g fill="url(#accent)">
      <rect x="-8" y="-110" width="16" height="25" rx="3"/>
      <rect x="-8" y="85" width="16" height="25" rx="3"/>
      <rect x="-110" y="-8" width="25" height="16" rx="3"/>
      <rect x="85" y="-8" width="25" height="16" rx="3"/>
      <rect x="-65" y="-85" width="16" height="25" rx="3" transform="rotate(45 -57 -72)"/>
      <rect x="49" y="-85" width="16" height="25" rx="3" transform="rotate(-45 57 -72)"/>
      <rect x="-65" y="60" width="16" height="25" rx="3" transform="rotate(-45 -57 72)"/>
      <rect x="49" y="60" width="16" height="25" rx="3" transform="rotate(45 57 72)"/>
    </g>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="50" fill="url(#accent)" opacity="0.1"/>
    
    <!-- Checkmark -->
    <path d="M-30 0 L-5 25 L40 -20" fill="none" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text below gear -->
  <text x="200" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">AM</text>
</svg>
</body>
</html>
