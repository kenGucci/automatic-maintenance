<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Automatic Maintenance - Banner</title>
</head>
<body style="margin:0;padding:0;background:#080c14;display:flex;justify-content:center;align-items:center;min-height:100vh;">
<svg width="1500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <path d="M0 100 H1500 M0 200 H1500 M0 300 H1500 M0 400 H1500" stroke="#3b82f6" stroke-width="1"/>
    <path d="M100 0 V500 M200 0 V500 M300 0 V500 M400 0 V500 M500 0 V500 M600 0 V500 M700 0 V500 M800 0 V500 M900 0 V500 M1000 0 V500 M1100 0 V500 M1200 0 V500 M1300 0 V500 M1400 0 V500" stroke="#3b82f6" stroke-width="1"/>
  </g>
  
  <!-- Animated line effect -->
  <rect x="0" y="245" width="1500" height="10" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Main icon - Gear with checkmark -->
  <g transform="translate(350, 150)" filter="url(#shadow)">
    <!-- Outer gear -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    
    <!-- Gear teeth -->
    <g fill="url(#accent)">
      <rect x="95" y="10" width="10" height="20" rx="2"/>
      <rect x="95" y="170" width="10" height="20" rx="2"/>
      <rect x="10" y="95" width="20" height="10" rx="2"/>
      <rect x="170" y="95" width="20" height="10" rx="2"/>
      <rect x="30" y="30" width="10" height="20" rx="2" transform="rotate(45 35 40)"/>
      <rect x="160" y="30" width="10" height="20" rx="2" transform="rotate(-45 165 40)"/>
      <rect x="30" y="150" width="10" height="20" rx="2" transform="rotate(-45 35 160)"/>
      <rect x="160" y="150" width="10" height="20" rx="2" transform="rotate(45 165 160)"/>
    </g>
    
    <!-- Checkmark inside -->
    <path d="M70 100 L90 120 L130 80" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Title text -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">AUTOMATIC</text>
  <text x="600" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#accent)" letter-spacing="-1">MAINTENANCE</text>
  
  <!-- Subtitle -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" font-weight="400">Autonomous AI Agent for System Monitoring &amp; Optimization</text>
  
  <!-- Feature badges -->
  <g transform="translate(600, 360)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#3b82f6" opacity="0.2"/>
    <text x="60" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="600"> Monitor</text>
    
    <rect x="130" y="0" width="120" height="36" rx="18" fill="#8b5cf6" opacity="0.2"/>
    <text x="190" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" font-weight="600"> Diagnose</text>
    
    <rect x="260" y="0" width="120" height="36" rx="18" fill="#10b981" opacity="0.2"/>
    <text x="320" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="600">✅ Auto-Fix</text>
    
    <rect x="390" y="0" width="120" height="36" rx="18" fill="#f59e0b" opacity="0.2"/>
    <text x="450" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="600">📊 Dashboard</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1200" cy="100" r="50" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1300" cy="400" r="80" fill="url(#accent)" opacity="0.05"/>
  <circle cx="150" cy="400" r="60" fill="url(#accent)" opacity="0.08"/>
  
  <!-- Bottom accent line -->
  <rect x="600" y="450" width="300" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
</body>
</html>
